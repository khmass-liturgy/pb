name: 🐄 다봄 시세 수집

on:
  schedule:
    - cron: '0 23 * * 1-5'   # 평일 오전 8시 KST (= 전날 23:00 UTC)
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch prices from KAPE API
        env:
          EKAPE_API_KEY: ${{ secrets.EKAPE_API_KEY }}
        run: python scripts/fetch_prices.py

      - name: Commit and push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add prices/
          git diff --staged --quiet || git commit -m "💰 시세 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M')"
          git push
